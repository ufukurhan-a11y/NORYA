<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 40" fill="none" aria-hidden="true">
  <!-- PayTR resmi logo: P + üç hız çizgisi, beyaz fon -->
  <!-- Beyaz fon -->
  <rect width="140" height="40" rx="6" fill="#FFFFFF"/>
  <rect x="0.5" y="0.5" width="139" height="39" rx="5.5" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <!-- Üç yatay hız çizgisi (solda, P’nin solundan) -->
  <rect x="6" y="13" width="5" height="1.8" rx="0.9" fill="#1565C0"/>
  <rect x="6" y="19" width="7" height="1.8" rx="0.9" fill="#1565C0"/>
  <rect x="6" y="25" width="5.5" height="1.8" rx="0.9" fill="#1565C0"/>
  <!-- Blok P: dikey gövde + üst kase -->
  <path d="M16 9h5v22h-5V9z" fill="#1565C0"/>
  <path d="M21 9h6c4.4 0 8 3.6 8 8s-3.6 8-8 8h-6V9z" fill="#1565C0"/>
  <path d="M21 13v10c2.2 0 4-1.8 4-4s-1.8-4-4-4h0z" fill="#FFFFFF"/>
  <!-- PAYTR -->
  <text x="40" y="26" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" letter-spacing="0.4" fill="#1565C0">PAYTR</text>
</svg>
