<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 40" fill="none" aria-hidden="true">
  <!-- PayTR resmi logo: stilize P + üç hız çizgisi + PAYTR yazısı (mavi) -->
  <!-- Üç yatay hız çizgisi (soldan, uzunluklar farklı: üst en uzun, alt en kısa) -->
  <rect x="4" y="12" width="10" height="2" rx="1" fill="#1565C0"/>
  <rect x="4" y="19" width="7" height="2" rx="1" fill="#1565C0"/>
  <rect x="4" y="26" width="5" height="2" rx="1" fill="#1565C0"/>
  <!-- Stilize P: yuvarlatılmış dikey gövde + üst kase -->
  <path d="M18 8h5v24h-5V8z" fill="#1565C0"/>
  <path d="M23 8h7c4.4 0 8 3.6 8 8s-3.6 8-8 8h-7V8z" fill="#1565C0"/>
  <path d="M23 12v10c2.2 0 4-1.8 4-4s-1.8-4-4-4v0z" fill="#FFFFFF"/>
  <!-- PAYTR -->
  <text x="42" y="27" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="0.3" fill="#1565C0">PAYTR</text>
