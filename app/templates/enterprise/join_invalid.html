{% extends "base.html" %}
{% block title %}Geçersiz Davet — NoryaAI{% endblock %}
{% block meta_seo %}<meta name="robots" content="noindex,nofollow" />{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg p-8 text-center">
      <div class="w-14 h-14 mx-auto mb-4 rounded-xl bg-red-50 flex items-center justify-center">

      <a href="{{ localized_home_path(request) }}" class="inline-block px-6 py-3 rounded-full font-headline font-bold text-sm bg-gradient-to-r from-primary to-primary-container text-white shadow-lg hover:brightness-[1.02] transition-all">
        Ana sayfaya dön
      </a>
    </div>
  </div>
</div>
{% endblock %}
