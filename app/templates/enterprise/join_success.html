{% extends "base.html" %}
{% block title %}Davet Kabul Edildi — NoryaAI{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg p-8 text-center">
      <div class="w-14 h-14 mx-auto mb-4 rounded-xl bg-emerald-50 flex items-center justify-center">
        <svg class="w-7 h-7 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      </div>
      <h1 class="text-xl font-bold font-headline text-gray-900 mb-2">Kuruma katıldınız</h1>
      <p class="text-gray-600 text-sm mb-6">
        <strong>{{ institution.name }}</strong> kurumsal hesabına başarıyla katıldınız. Artık kurumunuzun analiz kotasını kullanabilirsiniz.
      </p>
      <div class="flex flex-col gap-3">
        <a href="/enterprise/dashboard" class="w-full px-6 py-3 rounded-full font-headline font-bold text-sm bg-gradient-to-r from-primary to-primary-container text-white shadow-lg hover:brightness-[1.02] transition-all">
          Kurumsal panele git
        </a>
        <a href="/" class="text-sm text-primary hover:underline">Ana sayfaya dön</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
