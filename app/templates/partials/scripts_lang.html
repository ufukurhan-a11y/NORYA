<!-- Language Switcher - PRODUCTION READY -->
<script>
(function() {
  if (window.__noryaLangSwitcherBound) return;
  window.__noryaLangSwitcherBound = true;

  const SELECTORS = {
    root: '[data-lang-switcher]',
    toggle: '[data-lang-toggle]',
    menu: '[data-lang-menu]',
    option: '[data-lang-option]',
    label: '#base-lang-current',
  };

  function getRoots() {
    return Array.from(document.querySelectorAll(SELECTORS.root));
  }

  function getMenu(root) {
    return root ? root.querySelector(SELECTORS.menu) : null;
  }

  function getToggle(root) {
    return root ? root.querySelector(SELECTORS.toggle) : null;
  }

  function normalizeLang(value) {
    return String(value || '').trim().toLowerCase();
  }

  function updateLabel(root, lang) {
    const safeLang = normalizeLang(lang).toUpperCase();
    const labelEl = document.getElementById('base-lang-current');
    if (labelEl) {
      labelEl.textContent = safeLang;
    }
  }

  function hardHideMenu(menu) {
    if (!menu) return;
    menu.classList.add('hidden');
    menu.classList.remove('is-open', 'open', 'show', 'visible', 'opacity-100', 'translate-y-0', 'scale-100');
    menu.classList.add('opacity-0', 'invisible', 'pointer-events-none');
    menu.setAttribute('aria-hidden', 'true');
    menu.style.display = 'none';
    menu.style.visibility = 'hidden';
    menu.style.opacity = '0';
    menu.style.pointerEvents = 'none';
  }

  function hardShowMenu(menu) {
    if (!menu) return;
    menu.classList.remove('hidden', 'opacity-0', 'invisible', 'pointer-events-none');
    menu.classList.add('is-open', 'open', 'show', 'visible', 'opacity-100', 'translate-y-0', 'scale-100');
    menu.setAttribute('aria-hidden', 'false');
    menu.style.display = 'block';
    menu.style.visibility = 'visible';
    menu.style.opacity = '1';
    menu.style.pointerEvents = 'auto';
  }

  function closeMenu(root) {
    if (!root) return;
    const btn = getToggle(root);
    const menu = getMenu(root);

    root.classList.remove('is-open', 'open', 'show');
    if (btn) btn.setAttribute('aria-expanded', 'false');
    hardHideMenu(menu);
  }

  function openMenu(root) {
    if (!root) return;
    const btn = getToggle(root);
    const menu = getMenu(root);

    root.classList.add('is-open', 'open', 'show');
    if (btn) btn.setAttribute('aria-expanded', 'true');
    hardShowMenu(menu);
  }

  function closeAll(exceptRoot = null) {
    getRoots().forEach((root) => {
      if (exceptRoot && root === exceptRoot) return;
      closeMenu(root);
    });
  }

  function resolveLangFromOption(option) {
    if (!option) return '';
    const fromDataset = option.getAttribute('data-lang') || option.dataset.lang;
    if (fromDataset) return normalizeLang(fromDataset);
    return normalizeLang(option.textContent);
  }

  function applyLocale(lang) {
    const safeLang = normalizeLang(lang);
    if (!safeLang) return;

    try {
      localStorage.setItem('norya_lang', safeLang);
      document.cookie = `norya_lang=${safeLang}; path=/; max-age=31536000; SameSite=Lax`;
      document.documentElement.setAttribute('lang', safeLang);
      document.documentElement.setAttribute('dir', ['ar', 'he'].includes(safeLang) ? 'rtl' : 'ltr');
    } catch (err) {}

    // Use window.switchLocale if available (from enterprise_i18n.py)
    if (typeof window.switchLocale === 'function') {
      window.switchLocale(safeLang);
      return;
    }

    // Fallback: direct redirect with ?lang=
    const currentUrl = new URL(window.location.href);
    currentUrl.searchParams.set('lang', safeLang);
    window.location.assign(currentUrl.toString());
  }

  // Global click handler - toggle
  document.addEventListener('click', (e) => {
    const option = e.target.closest(SELECTORS.option);
    if (option) return;

    const toggle = e.target.closest(SELECTORS.toggle);
    const root = e.target.closest(SELECTORS.root);

    if (toggle && root) {
      e.preventDefault();
      e.stopPropagation();

      const isOpen = root.classList.contains('is-open') || getToggle(root)?.getAttribute('aria-expanded') === 'true';
      closeAll(root);

      if (isOpen) {
        closeMenu(root);
      } else {
        openMenu(root);
      }
      return;
    }

    if (!root) {
      closeAll();
    }
  }, true);

  // Pointerdown handler - option click (language change)
  document.addEventListener('pointerdown', (e) => {
    const option = e.target.closest(SELECTORS.option);
    const root = e.target.closest(SELECTORS.root);

    if (!option || !root) return;

    e.preventDefault();
    e.stopPropagation();
    if (typeof e.stopImmediatePropagation === 'function') {
      e.stopImmediatePropagation();
    }

    const lang = resolveLangFromOption(option);
    console.log('[lang-switcher] Language selected:', lang);
    
    if (!lang) {
      console.error('[lang-switcher] No lang found!');
      return;
    }

    updateLabel(root, lang);
    closeMenu(root);
    closeAll();

    console.log('[lang-switcher] Applying locale:', lang);
    
    // Direct redirect - no delay
    applyLocale(lang);
  }, true);

  // Escape key handler
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeAll();
    }
  }, true);

  // Initialize all switchers
  getRoots().forEach((root) => {
    const btn = getToggle(root);
    const menu = getMenu(root);

    if (btn) {
      btn.setAttribute('type', 'button');
      btn.setAttribute('aria-haspopup', 'true');
      btn.setAttribute('aria-expanded', 'false');
    }

    if (menu) {
      hardHideMenu(menu);
    }

    root.style.position = root.style.position || 'relative';
    root.style.zIndex = '5000';
  });

  // Inject styles
  const styleId = 'norya-lang-switcher-fix-style';
  if (!document.getElementById(styleId)) {
    const style = document.createElement('style');
    style.id = styleId;
    style.textContent = `
      ${SELECTORS.root} { position: relative !important; z-index: 5000 !important; }
      ${SELECTORS.menu} {
        position: absolute !important;
        top: calc(100% + 8px) !important;
        right: 0 !important;
        z-index: 5001 !important;
        min-width: 160px !important;
      }
      header, nav, .navbar, .nav-container, .subnav, .topbar {
        overflow: visible !important;
      }
    `;
    document.head.appendChild(style);
  }

  console.log('[lang-switcher-fix] ready');
})();
</script>
