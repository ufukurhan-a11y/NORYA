<!-- Müşteri İletişim Merkezi (Chat Widget) -->
<script>
  (function () {
    function loadChatWidget() {
      var css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = '/static/css/chat-widget.css';
      document.head.appendChild(css);

      var js = document.createElement('script');
      js.src = '/static/js/chat-widget.js';
      js.defer = true;
      document.body.appendChild(js);
    }

    if ('requestIdleCallback' in window) {
      requestIdleCallback(loadChatWidget, { timeout: 3000 });
      return;
    }
    setTimeout(loadChatWidget, 1200);
  })();
</script>
<noscript><link rel="stylesheet" href="/static/css/chat-widget.css" /></noscript>
