<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Norya Admin Giriş</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .wa-float{ position: fixed !important; right: 20px; bottom: 20px; z-index: 9999; width: 60px; height: 60px; border-radius: 999px; background: #25D366; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 10px 30px rgba(2,6,23,.18); }
    .wa-float:hover{ transform: translateY(-2px); }
    .wa-icon{ display: block; width: 32px; height: 32px; object-fit: contain; }
  </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm rounded-xl bg-slate-800 border border-slate-700 p-6 shadow-xl">
    <div class="flex justify-center mb-4">
      <img src="/static/norya_logo_transparent_trim.png" alt="Norya" class="h-10 w-auto max-w-[200px] object-contain" />
    </div>
    <h1 class="text-xl font-semibold text-white mb-2 text-center">Norya Admin</h1>
    <p class="text-slate-400 text-sm mb-4">ADMIN_SECRET ile giriş yapın.</p>
    {% if err %}
    <p class="text-red-400 text-sm mb-2">{% if err == 'config' %}Admin yapılandırılmamış.{% elif err == 'lockout' %}Çok fazla başarısız deneme. 15 dakika sonra tekrar deneyin.{% else %}Geçersiz şifre.{% endif %}</p>
    {% endif %}
    <form method="post" action="/admin/login" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token or '' }}" />
      <div>
        <label for="secret" class="block text-sm text-slate-400 mb-1">Admin şifresi</label>
        <input type="password" id="secret" name="admin_secret" required
          class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-white placeholder-slate-500 focus:ring-2 focus:ring-brand focus:border-transparent"
          placeholder="ADMIN_SECRET" />
      </div>
      <button type="submit" class="w-full py-2 rounded-lg bg-brand hover:bg-brand/90 text-white font-medium">
        Giriş
      </button>
    </form>
  </div>

  <a href="https://wa.me/905071703564?text=Merhaba%20Norya%2C%20kan%20tahlili%20analizi%20hakk%C4%B1nda%20bilgi%20almak%20istiyorum."
     target="_blank" rel="noopener"
     class="wa-float"
     aria-label="WhatsApp ile iletişim">
    <img src="/static/images/whatsapp-icon-white.svg" alt="WhatsApp" class="wa-icon" width="32" height="32" />
  </a>
</body>
</html>
